<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animations-2</title>
</head>
<style>
    .fadeInOut {
        opacity: 0;
        transform: translateY(30px);
        transition: all 2s ease-out;
    }

    .fadeInOut.show {
        opacity: 1;
        transform: translateY(0);
    }

    .fadeInOut.hide {
        opacity: 0;
        transform: translateY(-30px);
    }


    .fadein {
        opacity: 0;
        transform: translateY(40px);
        transition: all 2s ease-out;
    }

    .fadein.show {
        opacity: 1;
        transform: translateY(0);
    }


    .zoomIn {
        opacity: 0;
        transform: scale(0.6);
        transition: all 2s ease-out;
    }

    .zoomIn.show {
        opacity: 1;
        transform: scale(1);
    }


    .rotateIn {
        opacity: 0;
        transform: rotate(-25deg);
        transition: all 2s ease-out;
    }

    .rotateIn.show {
        opacity: 1;
        transform: rotate(0);
    }

    .fadeOut {
        opacity: 1;
        transition: opacity 2s ease-out;
    }

    .fadeOut.hide {
        opacity: 0;
    }


    .backg {
        background: rgb(4, 255, 0);
        padding: 40px;
    }

    .backg-1 {
        background: rgb(0, 0, 255);
        padding: 40px;
    }

    .backg-2 {
        background: rgb(255, 0, 0);
        padding: 40px;
    }

    .backg-3 {
        background: rgb(225, 255, 0);
        padding: 40px;
    }

    .backg-4 {
        background: rgb(255, 187, 0);
        padding: 40px;
    }

    .box {
        width: 100px;
        height: 100px;
        background: blue;
        animation: fade 2s infinite;
    }

    @keyframes fade {
        0% {
            opacity: 1;
        }

        50% {
            opacity: 0.3;
        }

        100% {
            opacity: 1;
        }
    }
</style>

<body>

    <div class="box">

    </div>
    <div class="backg">
        <div class="fadeInOut ">
            Fade-Up Custom Animation
        </div>

        <div class="fadeInOut ">
            Section 2
        </div>

        <div class="fadeInOut ">
            Section 3
        </div>
    </div>
    <div class="backg-1">
        <div class="fadein">
            fadein Custom Animation
        </div>

        <div class="fadein">
            Section 2
        </div>

        <div class="fadein">
            Section 3
        </div>
    </div>
    <div class="backg-2">
        <div class="zoomIn">
            zoomIn Custom Animation
        </div>

        <div class="zoomIn">
            Section 2
        </div>

        <div class="zoomIn">
            Section 3
        </div>
    </div>
    <div class="backg-3">
        <div class="rotateIn">
            rotateIn Custom Animation
        </div>

        <div class="rotateIn">
            Section 2
        </div>

        <div class="rotateIn">
            Section 3
        </div>
    </div>
    <div class="backg-4">
        <div class="fadeOut">
            fadeOut Custom Animation
        </div>

        <div class="fadeOut">
            Section 2
        </div>

        <div class="fadeOut">
            Section 3
        </div>
    </div>













    <script>
        const fadeInOutItems = document.querySelectorAll(".fadeInOut");

        const fadeInOutObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {

                if (entry.isIntersecting) {
                    entry.target.classList.add("show");
                    entry.target.classList.remove("hide");
                }
                else {
                    entry.target.classList.add("hide");
                    entry.target.classList.remove("show");
                }

            });
        });

        fadeInOutItems.forEach(el => fadeInOutObserver.observe(el));





        const fadeInItems = document.querySelectorAll(".fadein");

        const fadeInObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add("show");
                } else {
                    entry.target.classList.remove("show"); // REMOVE → infinite
                }
            });
        });
        fadeInItems.forEach(el => fadeInObserver.observe(el));




        const zoomItems = document.querySelectorAll(".zoomIn");

        const zoomObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add("show");
                } else {
                    entry.target.classList.remove("show"); // REMOVE → infinite
                }
            });
        });

        zoomItems.forEach(el => zoomObserver.observe(el));




        const rotateItems = document.querySelectorAll(".rotateIn");

        const rotateObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add("show");
                } else {
                    entry.target.classList.remove("show"); // REMOVE → infinite
                }
            });
        });

        rotateItems.forEach(el => rotateObserver.observe(el));




        const fadeOutElements = document.querySelectorAll(".fadeOut");

        const fadeOutObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {

                if (entry.isIntersecting) {
                    entry.target.classList.add("hide");  // fade-out
                } else {
                    entry.target.classList.remove("hide"); // reset (infinite)
                }

            });
        });

        fadeOutElements.forEach(el => fadeOutObserver.observe(el));

    </script>

</body>

</html>
