<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>collapse-2 by bs</title>

</head>
<style>
    #toggle:checked+.collapse-box {
        max-height: 200px;
        padding: 15px;
    }

    .collapse-box {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.4s ease;
        background: #eee;
        padding: 0 15px;
    }
</style>

<body>
    <div class="collapse-div">
        <label for="toggle">Show / Hide</label>
        <input type="checkbox" id="toggle" hidden>

        <div class="collapse-box">
            <p>Pure CSS se collapse example.</p>
        </div>


    </div>

















</body>

</html>
