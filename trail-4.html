<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>panaroma with JS</title>
</head>
<style>
    .pano-slider {
        width: 100%;
        height: 300px;
        overflow: hidden;
        position: relative;
        cursor: grab;
        border-radius: 10px;
    }

    .pano-track img {
        width: 200%;
        /* wide panorama */
        height: 100%;
        object-fit: cover;
        user-select: none;
        /* prevent text selection */
        pointer-events: none;
        /* better dragging */
    }
</style>

<body>
    <div class="pano-slider">
        <div class="pano-track">
            <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=2400&q=80" />
            
        </div>
    </div>













    <script>
        const slider = document.querySelector('.pano-slider');
        const track = document.querySelector('.pano-track');

        let isDown = false;
        let startX;
        let scrollX = 0;

        // Mouse down
        slider.addEventListener('mousedown', (e) => {
            isDown = true;
            slider.style.cursor = "grabbing";
            startX = e.pageX - scrollX;
        });

        // Mouse up
        window.addEventListener('mouseup', () => {
            isDown = false;
            slider.style.cursor = "grab";
        });

        // Mouse move
        slider.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            scrollX = e.pageX - startX;
            track.style.transform = `translateX(${scrollX}px)`;
        });

    </script>
</body>

</html>
