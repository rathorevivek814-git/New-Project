<!DOCTYPE html>
<html>

<head>
    <style>
        .Demo-1 {
            color: red;
            font-size: 25px;
        }

        #demo:target {
            background: yellow;

        }
    </style>
    <title>JavaScript with id </title>
</head>

<body>
    <h1><a href="#demo">JavaScript Arrays</a></h1>
    <h2>The join() Method</h2>

    <p>The join() method joins array elements into a string.</p>
    <p>It this example we have used " * " as a separator between the elements:</p>



    <p class="Demo-1" id="demo"></p>

    <script>

        if (window.location.hash) {
            history.replaceState("", document.title, window.location.pathname);
        }

        const fruits = ["Banana", "Orange", "Apple", "Mango"];
        let viv = fruits.join(" * ")
        document.getElementById("demo").innerHTML = viv;
    </script>

</body>

</html>
