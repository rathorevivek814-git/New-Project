<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>todo list </title>
</head>
<style>
    section {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .todo-lists-elem {
        margin-top: 20px;
    }

    .main_todo_div {
        display: flex;
        justify-content: space-around;
        align-items: center;
    }

    .close-btn {
        cursor: pointer;
        font-family: sans-serif;
        font-size: 12px;
        position: absolute;
        right: 5px;
        top: 4px;
    }

    .input-btn-div {
        display: flex;
        gap: 10px;

    }

    .input-close-div {
        position: relative;
    }
</style>

<body>
    <section>
        <div class="main-div">
            <div class="content-div">
                <h1>Todo list</h1>
                <form>
                    <div class="input-btn-div">
                        <div class="input-close-div">
                            <input type="text" id="inputvalue">
                            <span class="close-btn">X</span>
                        </div>
                        <button class="btn"> Add todo</button>
                    </div>
                    <div class="todo-lists-elem">

                    </div>
                </form>
            </div>
        </div>
    </section>


    <script>
        const main_todo_elem = document.querySelector(".todo-lists-elem");
        const input_value = document.getElementById("inputvalue");
        const Button = document.querySelector(".btn");

        const closeBtn = document.querySelector(".close-btn");

        const addTodoLists = function (e) {
            e.preventDefault();

            if (input_value.value === "") {
                input_value.placeholder = "Please enter a todo";
                return;
            }
            const divElement = document.createElement("div");
            divElement.classList.add("main_todo_div");
            divElement.innerHTML = `<li>${input_value.value}</li>
             <button class ="Delete-btn">Delete</button>`;
            main_todo_elem.append(divElement);

            // clear input
            input_value.value = "";

            const delete_button = divElement.querySelector(".Delete-btn");
            // delete functionality
            delete_button.addEventListener("click", () => {
                divElement.remove();
            });
        };
        const closeButton = function () {
            input_value.value = "";
        };

        closeBtn.addEventListener("click", closeButton);
        Button.addEventListener("click", addTodoLists)
    </script>
</body>

</html>
