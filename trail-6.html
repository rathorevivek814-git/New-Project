<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>

</style>
<body>

    <section>
        <div class="rectangle"></div>
        <button id="btn"> click</button>
    </section>






    <script>
        document.getElementById("btn").addEventListener("click", () => {
            const rect = document.querySelector(".rectangle");

            rect.style.cssText = "background-color:#000; width:500px; height:500px;";

        });





        

        let rectDiv = document.getElementsByClassName("rectangle")[0];
        let mybtn = document.getElementById("btn");

        const handlemouse = function () {
            rectDiv.style.backgroundColor = "#000";
            rectDiv.style.width = "500px";
            rectDiv.style.height = "500px";
        }

        mybtn.addEventListener("click", handlemouse);
    </script>

</body>

</html>
