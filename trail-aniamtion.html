<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animation</title>
</head>
<style>
    .main.-container {
    display: flex;
    justify-content: space-evenly;
    align-items: center;
    height: 80vh;
}

    .container-1 {
        width: 200px;
        height: 300px;
        position: relative;
        display: flex;
        justify-content: center;
        border-bottom: 3px solid #222;
        /* ground line */

    }

    .ball-1 {
        width: 100px;
        height: 100px;
        background: #ff3b3b;
        border-radius: 50%;
        position: absolute;
        bottom: 0;
        animation: bounce-1 1s infinite cubic-bezier(.28, .84, .42, 1);
    }

    .container-2 {
        width: 200px;
        height: 300px;
        position: relative;
        display: flex;
        justify-content: center;
        border-bottom: 3px solid #222;
        /* ground line */

    }

    .ball-2 {
        width: 100px;
        height: 100px;
        background: #ff3b3b;
        border-radius: 50%;
        position: absolute;
        bottom: 0;
        animation: bounce-2 1s infinite cubic-bezier(.28, .84, .42, 1);
    }

    @keyframes bounce-1 {
        0% {
            transform: translateY(0) scale(1, 1);
            /* start - niche */
        }

        50% {
            transform: translateY(-300px) scale(1.1, 0.9);
            /* upar */
        }

        100% {
            transform: translateY(0) scale(1, 1);
            /* wapas niche */
        }
    }

    @keyframes bounce-2 {
        0% {
            transform: translateY(0) scale(1, 1);
            /* normal shape */
        }

        15% {
            transform: translateY(-120px) scale(0.95, 1.05);
            /* going up */
        }

        30% {
            transform: translateY(-200px) scale(0.9, 1.1);
            /* highest point */
        }

        50% {
            transform: translateY(0) scale(1.2, 0.8);
            /* squash on ground */
        }

        70% {
            transform: translateY(-80px) scale(0.95, 1.05);
        }

        85% {
            transform: translateY(-40px) scale(1, 1);
        }

        100% {
            transform: translateY(0) scale(1.1, 0.9);
            /* small squash */
        }
    }
</style>

<body>
    <div class="main -container">
        <div class="container-1">
            <div class="ball-1"></div>
        </div>
        <div class="container-2">
            <div class="ball-2"></div>
            
        </div>
    </div>
</body>

</html>
