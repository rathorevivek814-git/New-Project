<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOS Scroll Animations Demo</title>

    <!-- AOS CSS -->
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 0;
            margin: 0;
            background: #f4f4f4;
        }

        section {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
        }

        .box {
            width: 350px;
            height: 200px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            font-size: 24px;
            text-align: center;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <!-- fade-up -->
    <section>
        <div class="box" data-aos="fade-up">
            fade-up Animation
        </div>
    </section>

    <!-- fade-down -->
    <section>
        <div class="box" data-aos="fade-down">
            fade-down Animation
        </div>
    </section>

    <!-- fade-left -->
    <section>
        <div class="box" data-aos="fade-left">
            fade-left Animation
        </div>
    </section>

    <!-- fade-right -->
    <section>
        <div class="box" data-aos="fade-right">
            fade-right Animation
        </div>
    </section>

    <!-- zoom-in -->
    <section>
        <div class="box" data-aos="zoom-in">
            zoom-in Animation
        </div>
    </section>

    <!-- zoom-out -->
    <section>
        <div class="box" data-aos="zoom-out">
            zoom-out Animation
        </div>
    </section>

    <!-- flip-left -->
    <section>
        <div class="box" data-aos="flip-left">
            flip-left Animation
        </div>
    </section>

    <!-- flip-right -->
    <section>
        <div class="box" data-aos="flip-right">
            flip-right Animation
        </div>
    </section>

    <!-- slide-up -->
    <section>
        <div class="box" data-aos="slide-up">
            slide-up Animation
        </div>
    </section>

    <!-- slide-down -->
    <section>
        <div class="box" data-aos="slide-down">
            slide-down Animation
        </div>
    </section>

    <!-- AOS Script -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 1000,   // animation speed
            once: false,      // true = animation only once
        });
    </script>

</body>
</html>

</body>
</html>
