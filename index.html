<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blueoaknx</title>
</head>
<style>
    .main-container-woovr-variation {
        width: 500px;
        margin: 0 auto;
    }

    .woovr-variation-single-product {
        display: flex;
        justify-content: space-between;
    }

    p.price-woovr-variation {
        margin: 0;
        font-size: 16px;
        color: #145656;
        font-weight: 600;
        font-family: Rubik;
        line-height: 22px;
    }

    p.text-woovr-variation {
        margin: 0 0 0px 0;
        font-size: 14px;
        color: #145656;
        font-weight: 500;
        font-family: Rubik;
        line-height: 20px;
    }



    .text-label-container-woovr-variation label {
        font-size: 24px;
        color: #145656;
        font-weight: 400;
        font-family: Rubik;
        line-height: 20px;
    }

    .text-container-woovr-variation {
        margin-top: 10px;
    }

    .woovr-variation-left-content {
        display: flex;
        gap: 10px;
    }

    #woovr_123 {
        width: 18px;
        height: 18px;
    }



    /* hide real checkbox but keep functionality */
    #woovr_124 {
        position: absolute;
        opacity: 0;
    }

    /* visible checkbox */
    .checkbox-ui {
        width: 18px;
        height: 18px;
        border: 2px solid #145656;
        display: inline-block;
        cursor: pointer;
        position: relative;
        border-radius: 0;
        background-color: #fff;
    }

    /* checked background color */
    #woovr_124:checked+.checkbox-ui {
        background-color: #145656;
    }

    /* tick mark */
    #woovr_124:checked+.checkbox-ui::after {
        content: "";
        position: absolute;
        left: 6px;
        top: 1px;
        width: 5px;
        height: 10px;
        border: solid white;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
    }
    #mybtn, #mybtn-2
    {
        padding: 20px;
    }
</style>

<body>
    <div class="main-container-woovr-variation">
        <div class="woovr-variation-single-product">
            <div class="woovr-variation-left-content">
                <div class="woovr-variation-checkbox">
                    <input type="checkbox" id="woovr_123" name="woovr_321">


                </div>
                <div class="text-label-container-woovr-variation">
                    <label for="woovr_789">1 box</label>
                    <div class="text-container-woovr-variation">
                        <p class="text-woovr-variation">60 sachets - 1 month supply</p>
                        <p class="text-woovr-variation">Free Shipping</p>
                    </div>
                </div>
            </div>
            <div class="woovr-variation-right-content">
                <p class="price-woovr-variation"><span>$</span>380</p>
            </div>
        </div>
    </div>



    <div class="woovr-variation-checkbox">
        <input type="checkbox" id="woovr_124">
        <label for="woovr_124" class="checkbox-ui"></label>
        <button onclick="alert('window')">get</button> <!--Inline events-->
    </div>
    <div class="my">
        <button id="mybtn" >button</button>
        <button id="mybtn-2" >button-2</button>
    </div>


<input type="text" id="mybtn-2" placeholder="Type something">

    <script>
        document.getElementById('mybtn').onclick = function () {
            alert("to window");
        };//ye dom event handler


         document.getElementById('mybtn-2').addEventListener('scroll', function () {
            alert("to the window");
        }); // addeventlistner event handler

        document.getElementById("mybtn-2").addEventListener("change", function () {
    alert("Input value change hui");
});
    </script>
</body>

</html>
