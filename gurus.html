<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gurus aniamtion trail</title>
</head>
<style>
    .scale-in {
        opacity: 0;
        transform: scale(0.8);
        animation: scaleIn .8s ease forwards;
    }

    @keyframes scaleIn {
        to {
            opacity: 1;
            transform: scale(1);
        }
    }

    .fade-in {
        opacity: 0;
        transform: translateY(100px);
        animation: fadeInUp 1s ease forwards;
    }

    @keyframes fadeInUp {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .card {
        width: 250px;
        padding: 20px;
        background: #fff;
        border-radius: 12px;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 25px rgba(0, 0, 0, 0.15);
    }

    .img-box {
        width: 300px;
        overflow: hidden;
        border-radius: 12px;

    }

    .img-box img {
        width: 100%;
        transition: transform .4s ease;
    }

    .img-box:hover img {
        transform: scale(1.1);
    }

    .btn {
        padding: 12px 25px;
        background: #4a4aff;
        color: #fff;
        border-radius: 8px;
        transition: 0.3s ease;
    }

    .btn:hover {
        box-shadow: 0 0 15px rgba(74, 74, 255, 0.7);
        transform: translateY(-300px);
    }

    .border-anim {
        display: inline-block;
        padding: 10px 20px;
        position: relative;
    }

    .border-anim::after {
        content: "";
        position: absolute;
        width: 0;
        height: 2px;
        left: 0;
        bottom: 0;
        background: #000;
        transition: width .3s ease;
    }

    .border-anim:hover::after {
        width: 100%;
    }

    .typewriter {
        overflow: hidden;
        white-space: nowrap;
        border-right: 3px solid #000;
        font-size: 24px;
        animation: typing 3s steps(30), blink .7s infinite;
    }

    @keyframes typing {
        from {
            width: 0;
        }

        to {
            width: 100%;
        }
    }

    @keyframes blink {
        50% {
            border-color: transparent;
        }
    }

    .float {
        animation: floatAnim 3s ease-in-out infinite;
    }

    @keyframes floatAnim {

        0%,
        100% {
            transform: translateY(0);
        }

        50% {
            transform: translateY(-12px);
        }
    }

    .reveal-card {
        padding: 25px;
        border-radius: 15px;
        backdrop-filter: blur(10px);
        background: rgba(255, 255, 255, 0.15);
        color: #000000;
        transition: 0.4s ease;
    }

    .reveal-card:hover {
        background: rgba(255, 255, 255, 0.30);
        transform: translateY(-8px);
    }

    .tilt {
        perspective: 1000px;
    }

    .tilt img {
        width: 300px;
        transition: transform 0.4s ease;
    }

    .tilt:hover img {
        transform: rotateY(12deg) rotateX(5deg) scale(1.05);
    }

    .slide-up {
        opacity: 0;
        transform: translateY(40px);
        animation: slideUp 1s ease forwards;
    }

    @keyframes slideUp {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .glow-box {
        padding: 20px;
        border-radius: 12px;
        background: #111;
        color: #fff;
        position: relative;
    }

    .glow-box::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 12px;
        padding: 2px;
        background: linear-gradient(90deg, #ff00c8, #00d1ff);
        -webkit-mask:
            linear-gradient(#000 0 0) content-box,
            linear-gradient(#000 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        animation: glow 3s linear infinite;
    }

    @keyframes glow {
        0% {
            filter: hue-rotate(0deg);
        }

        100% {
            filter: hue-rotate(360deg);
        }
    }
</style>

<body>
    <h1 class="scale-in">Grow Your Business</h1>

    <div class="fade-in">Yeh content scroll par fade hoga</div>

    <hr>

    <div class="card">
        <h3>Our Services</h3>
        <p>Web Development</p>
    </div>

    <hr>

    <div class="img-box">
        <img src="Assests/img/Screenshot 2025-11-08 174907.png">

    </div>

    <a class="btn">Contact Us</a>

    <div class="border-anim">UI/UX Design</div>
    <h2 class="typewriter">We Build Amazing Websites</h2>

    <img src="Assests/img/Screenshot 2025-11-08 174907.png" class="float">


    <div class="reveal-card">
        <h3>Web Development</h3>
        <p>Modern responsive websites.</p>
    </div>

    <div class="tilt">
        <img src="Assests/img/usman-yousaf-4fo0gcw76so-unsplash.jpg">
    </div>

    <section class="slide-up">This section slides up and appears.</section>

    <div class="glow-box">UI/UX Design</div>
</body>

</html>
