<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hover effect</title>
</head>
<style>
    .hover-box {
    position: relative;
    display: inline-block;
    overflow: hidden;
    width: 50%;
}

.hover-box::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.4); /* light overlay */
    transition: all 0.6s ease;
}

.hover-box:hover::before {
    left: 100%;
}





.diagonal-hover {
    position: relative;
    overflow: hidden;
    display: inline-block;
    width: 50%;
}

.diagonal-hover::before {
    content: "";
    position: absolute;
    top: -200%;
    right: -200%;
    width: 200%;
    height: 100%;
    background: rgba(255,255,255,0.4);
    transform: rotate(45deg);
    transition: all 1.8s ease;
}

.diagonal-hover:hover::before {
    top: 100%;
    right: 100%;
}

img{
    width: 50%;
}







</style>
<body>
    
    
<div class="hover-box">
    <img src="Assests/img/usman-yousaf-4fo0gcw76so-unsplash.jpg" alt="">
</div>

<div class="diagonal-hover">
    <img src="Assests/img/Screenshot 2025-11-08 174907.png" alt="">
</div>

</body>
</html>
