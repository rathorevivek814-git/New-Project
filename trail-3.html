<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAnomara without JS</title>

</head>
<style>
    .pano-slider {
        width: 100%;
        height: 300px;
        overflow: hidden;
        border-radius: 10px;
        position: relative;
    }

    .pano-track {
        width: 200%;
        /* Image is twice the container */
        height: 100%;
        animation: slide 25s linear infinite;
    }

    .pano-track img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

     @keyframes slide {
        0% {
            transform: translateX(0);
        }

        100% {
            transform: translateX(-50%);
        }
    } 
</style>

<body>
    <div class="pano-slider">
        <div class="pano-track">
            <img src="Assests/img/usman-yousaf-4fo0gcw76so-unsplash.jpg" />
        </div>
    </div>

</body>

</html>
