<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grdient</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    /* Body styling */
    body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
    }

    section {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .main-div {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
</style>

<body>
    <section>
        <div class="main-div">
            <div class="btn-div">
                <button id="mybtn1">button-1</button>
                <button id="mybtn2">button-2</button>
            </div>
            <h2>Copy Code Here</h2>

            <div class="copycode">

                background-image: linear-gradient(to right, #5c91e5, #c6b83f);

            </div>
        </div>





        <script>
            let btn1 = document.getElementById("mybtn1");
            let btn2 = document.getElementById("mybtn2");
            let copydiv = document.querySelector(".copycode");
            let rgb1 = "#be20ea";
            let rgb2 = "#000";


            const HexValues = function () {
                let hexvalues = "0123456789abcdef";
                let colors = "#";
                for (let i = 0; i < 6; i++) {

                    colors = colors + (hexvalues[Math.floor(Math.random() * 16)]);
                }
                return colors;
            }


            const handlebtn1 = function () {
                rgb1 = HexValues();
                console.log(rgb1);
                document.body.style.backgroundImage = `linear-gradient(to right, ${rgb1}, ${rgb2})`;
                copydiv.innerHTML = `background-image:linear-gradient(to right, ${rgb1}, ${rgb2})`;
                btn1.innerHTML = rgb1;

            };
            const handlebtn2 = function () {
                rgb2 = HexValues();
                console.log(rgb2);
                document.body.style.backgroundImage = `linear-gradient(to right, ${rgb2}, ${rgb1})`;
                copydiv.innerHTML = `background-image:linear-gradient(to right, ${rgb1}, ${rgb2})`;
                btn2.innerHTML = rgb2;

            };


            btn1.addEventListener("click", handlebtn1);
            btn2.addEventListener("click", handlebtn2);
        </script>
    </section>
</body>

</html>
