<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .video-box {
        position: relative;
        width: 600px;
        cursor: pointer;
    }

    .video-box img {
        width: 100%;
        border-radius: 20px;
    }

    .play-btn {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        color: orange;
        font-size: 30px;
        border-radius: 50%;
        width: 70px;
        height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .popup {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.8);
        justify-content: center;
        align-items: center;
    }

    .popup iframe {
        width: 80%;
        height: 450px;
    }

    .popup .close {
        position: absolute;
        top: 20px;
        right: 30px;
        color: white;
        font-size: 40px;
        cursor: pointer;
    }
</style>

<body>
    <div class="video-box">
        <img src="thumbnail.jpg" alt="Video">
        <div class="play-btn" onclick="openVideo()">▶</div>
    </div>

    <div id="videoPopup" class="popup">
        <span class="close" onclick="closeVideo()">×</span>
        <iframe id="videoFrame" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen>
        </iframe>
    </div>







    <script>
        function openVideo() {
            document.getElementById("videoPopup").style.display = "flex";
            document.getElementById("videoFrame").src =
                "https://www.youtube.com/embed/VIDEO_ID?autoplay=1";
        }

        function closeVideo() {
            document.getElementById("videoPopup").style.display = "none";
            document.getElementById("videoFrame").src = "";
        }












      
    </script>

</body>

</html>
