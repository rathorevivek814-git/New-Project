<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
.trans 
{
    background-color: aquamarine;
    border-radius: 50%;
    width: 500px;
    height: 500px;
}
</style>
<body>

    <section>
        <div class="square"></div>
        <button id="btn"> click</button>
    </section>






    <script>
       




        

        let rectDiv = document.getElementsByClassName("square")[0];
        let mybtn = document.getElementById("btn");

        const handlemouse = function () {
            rectDiv.classList.add("trans");
        }

        mybtn.addEventListener("click", handlemouse);
    </script>

</body>

</html>
