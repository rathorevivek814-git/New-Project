<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drag + Scroll Slider</title>
<style>

/* ===== Slider Wrapper ===== */
.slider {
  width: 100%;
  max-width: 900px;
  height: 350px;
  margin: 40px auto;
  overflow-x: scroll;
  display: flex;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
  cursor: grab;
}

.slider:active {
  cursor: grabbing;
}

.slider::-webkit-scrollbar {
  display: none;
}

/* ===== Single Image Split into 4 Slides ===== */
.slide {
  min-width: 100%;
  height: 350px;
  background-image: url("Assests/img/usman-yousaf-4fo0gcw76so-unsplash.jpg"); /* Change this */
  background-size: 400% 100%;
  background-repeat: no-repeat;
  scroll-snap-align: start;
  ;
}

/* 4 different parts */
.s1 { background-position: 0% 0; }
.s2 { background-position: 33.33% 0; }
.s3 { background-position: 66.66% 0; }
.s4 { background-position: 100% 0; }

/* ===== Pagination Dots ===== */
.dots {
  text-align: center;
  margin-top: 15px;
}

.dot {
  display: inline-block;
  height: 12px;
  width: 12px;
  background: #bbb;
  border-radius: 50%;
  margin: 0 6px;
  cursor: pointer;
  transition: 0.3s;
}

.dot:hover {
  background: #333;
}

</style>
</head>
<body>

<div class="slider" id="slider">
  <div class="slide s1"></div>
  <div class="slide s2"></div>
  <div class="slide s3"></div>
  <div class="slide s4"></div>
</div>

<div class="dots">
  <span class="dot" onclick="goToSlide(0)"></span>
  <span class="dot" onclick="goToSlide(1)"></span>
  <span class="dot" onclick="goToSlide(2)"></span>
  <span class="dot" onclick="goToSlide(3)"></span>
</div>

<script>
/* ===== Dot click navigation ===== */
function goToSlide(n) {
  const slider = document.getElementById("slider");
  slider.scrollTo({
    left: n * slider.clientWidth,
    behavior: "smooth"
  });
}

/* ===== Drag / Swipe Slider ===== */
const slider = document.getElementById("slider");
let isDown = false;
let startX;
let scrollLeft;

slider.addEventListener("mousedown", (e) => {
  isDown = true;
  slider.classList.add("active");
  startX = e.pageX - slider.offsetLeft;
  scrollLeft = slider.scrollLeft;
});

slider.addEventListener("mouseleave", () => {
  isDown = false;
});

slider.addEventListener("mouseup", () => {
  isDown = false;
});

slider.addEventListener("mousemove", (e) => {
  if (!isDown) return;
  e.preventDefault();
  const x = e.pageX - slider.offsetLeft;
  const walk = (x - startX) * 1.5; // scroll speed
  slider.scrollLeft = scrollLeft - walk;
});

/* ===== Touch support for mobile ===== */
slider.addEventListener("touchstart", (e) => {
  startX = e.touches[0].pageX - slider.offsetLeft;
  scrollLeft = slider.scrollLeft;
});

slider.addEventListener("touchmove", (e) => {
  const x = e.touches[0].pageX - slider.offsetLeft;
  const walk = (x - startX) * 1.5;
  slider.scrollLeft = scrollLeft - walk;
});
</script>

</body>
</html>
